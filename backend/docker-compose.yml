# Ol1nLLM — backend services (OCR)
#
# Requires AiStack infra to be running first (it creates the 'ai' Docker network).
# nim-kontext-proxy a image-api přesunuto/odebráno — viz AiStack/deploy/docker-compose.yml.
# Deploy: docker compose -f backend/docker-compose.yml up -d --build
# Env vars: copy backend/.env.example to backend/.env and fill in secrets

services:

  ocr-api:
    build: ./ocr-api
    image: ol1nllm/ocr-api:latest
    container_name: ai-ocr-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8003:8003"
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HF_HUB_OFFLINE=1
      - OCR_MODEL_ID=${OCR_MODEL_ID:-Qwen/Qwen2.5-VL-7B-Instruct}
    volumes:
      - ${CACHE_QWEN_VL}:/root/.cache/huggingface
    shm_size: 16gb
    networks: [ai]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s

networks:
  ai:
    external: true
