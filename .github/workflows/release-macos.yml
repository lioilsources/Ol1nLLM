name: Release macOS

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build & Release macOS
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: .
        run: flutter pub get

      - name: Build macOS (debug)
        working-directory: .
        run: flutter build macos --debug --dart-define=CF_ACCESS_CLIENT_ID=${{ secrets.CF_ACCESS_CLIENT_ID }} --dart-define=CF_ACCESS_CLIENT_SECRET=${{ secrets.CF_ACCESS_CLIENT_SECRET }}

      - name: Package as ZIP
        run: |
          cd "./build/macos/Build/Products/Debug"
          zip -r "$OLDPWD/Ol1nLLM-${{ github.ref_name }}-macOS.zip" "ol1n_llm.app"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Ol1nLLM-${{ github.ref_name }}-macOS.zip
          name: Ol1nLLM ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: true
