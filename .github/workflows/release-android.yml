name: Release Android

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.1.0-alpha)'
        required: true

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.41.x'

jobs:
  build-android:
    name: Build & Release Android (APK)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Accept Android licenses & install SDK components
        run: |
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" "build-tools;35.0.0" \
            "ndk;28.2.13676358" "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: |
          flutter build apk --release \
            --dart-define=CF_ACCESS_CLIENT_ID=${{ secrets.CF_ACCESS_CLIENT_ID }} \
            --dart-define=CF_ACCESS_CLIENT_SECRET=${{ secrets.CF_ACCESS_CLIENT_SECRET }}

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             ol1n-llm-${{ steps.version.outputs.value }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ol1n-llm-apk
          path: ol1n-llm-${{ steps.version.outputs.value }}.apk
          retention-days: 30

      - name: Create git tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'refs/tags/${{ steps.version.outputs.value }}',
              sha: context.sha
            });

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: ol1n-llm-${{ steps.version.outputs.value }}.apk
          name: Ol1nLLM ${{ steps.version.outputs.value }}
          tag_name: ${{ steps.version.outputs.value }}
          generate_release_notes: true
          prerelease: ${{ contains(steps.version.outputs.value, 'alpha') || contains(steps.version.outputs.value, 'beta') || contains(steps.version.outputs.value, 'rc') }}
