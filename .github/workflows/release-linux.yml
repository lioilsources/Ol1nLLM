name: Release Linux

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    name: Build & Release Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install dependencies
        working-directory: .
        run: flutter pub get

      - name: Build Linux (debug)
        working-directory: .
        run: flutter build linux --debug --dart-define=CF_ACCESS_CLIENT_ID=${{ secrets.CF_ACCESS_CLIENT_ID }} --dart-define=CF_ACCESS_CLIENT_SECRET=${{ secrets.CF_ACCESS_CLIENT_SECRET }}

      - name: Package as tar.gz
        run: |
          tar -czf "Ol1nLLM-${{ github.ref_name }}-Linux.tar.gz" \
            -C ./build/linux/x64/debug/bundle .

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Ol1nLLM-${{ github.ref_name }}-Linux.tar.gz
          name: Ol1nLLM ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: true
