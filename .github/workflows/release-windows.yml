name: Release Windows

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build & Release Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        working-directory: .
        run: flutter pub get

      - name: Build Windows (debug)
        working-directory: .
        run: flutter build windows --debug --dart-define=CF_ACCESS_CLIENT_ID=${{ secrets.CF_ACCESS_CLIENT_ID }} --dart-define=CF_ACCESS_CLIENT_SECRET=${{ secrets.CF_ACCESS_CLIENT_SECRET }}

      - name: Package as ZIP
        shell: pwsh
        run: |
          $src = ".\build\windows\x64\runner\Debug"
          $dest = "Ol1nLLM-${{ github.ref_name }}-Windows.zip"
          Compress-Archive -Path "$src\*" -DestinationPath $dest

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Ol1nLLM-${{ github.ref_name }}-Windows.zip
          name: Ol1nLLM ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: true
