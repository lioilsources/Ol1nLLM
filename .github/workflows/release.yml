name: Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.1.0-alpha)'
        required: true

jobs:
  # ── Shared version resolution ────────────────────────────────────────────────
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      value: ${{ steps.v.outputs.value }}
    steps:
      - id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

  # ── Android ─────────────────────────────────────────────────────────────────
  android:
    name: Build APK
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true
      - name: Accept Android licenses & install SDK components
        run: |
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" "build-tools;35.0.0" \
            "ndk;28.2.13676358" "ndk;27.0.12077973" "cmake;3.22.1"
      - run: flutter pub get
      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=CF_ACCESS_CLIENT_ID=${{ secrets.CF_ACCESS_CLIENT_ID }} \
            --dart-define=CF_ACCESS_CLIENT_SECRET=${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             ol1n-llm-${{ needs.version.outputs.value }}.apk
      - uses: actions/upload-artifact@v4
        with:
          name: apk-${{ needs.version.outputs.value }}
          path: ol1n-llm-${{ needs.version.outputs.value }}.apk
          retention-days: 30

  # ── iOS ─────────────────────────────────────────────────────────────────────
  ios:
    name: Build IPA
    runs-on: macos-latest
    needs: version
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Build iOS (no codesign)
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=CF_ACCESS_CLIENT_ID=${{ secrets.CF_ACCESS_CLIENT_ID }} \
            --dart-define=CF_ACCESS_CLIENT_SECRET=${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      - name: Package as IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r ol1n-llm-${{ needs.version.outputs.value }}.ipa Payload/
      - uses: actions/upload-artifact@v4
        with:
          name: ipa-${{ needs.version.outputs.value }}
          path: ol1n-llm-${{ needs.version.outputs.value }}.ipa
          retention-days: 30

  # ── macOS ────────────────────────────────────────────────────────────────────
  macos:
    name: Build macOS
    runs-on: macos-latest
    needs: version
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Build macOS
        run: |
          flutter build macos --release \
            --dart-define=CF_ACCESS_CLIENT_ID=${{ secrets.CF_ACCESS_CLIENT_ID }} \
            --dart-define=CF_ACCESS_CLIENT_SECRET=${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      - name: Package
        run: |
          cd build/macos/Build/Products/Release
          zip -r "$GITHUB_WORKSPACE/ol1n-llm-${{ needs.version.outputs.value }}-macos.zip" *.app
      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ needs.version.outputs.value }}
          path: ol1n-llm-${{ needs.version.outputs.value }}-macos.zip
          retention-days: 30

  # ── Windows ──────────────────────────────────────────────────────────────────
  windows:
    name: Build Windows
    runs-on: windows-latest
    needs: version
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Build Windows
        run: |
          flutter build windows --release `
            --dart-define=CF_ACCESS_CLIENT_ID=${{ secrets.CF_ACCESS_CLIENT_ID }} `
            --dart-define=CF_ACCESS_CLIENT_SECRET=${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      - name: Package
        shell: pwsh
        run: |
          Compress-Archive `
            -Path build\windows\x64\runner\Release\* `
            -DestinationPath "ol1n-llm-${{ needs.version.outputs.value }}-windows.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-${{ needs.version.outputs.value }}
          path: ol1n-llm-${{ needs.version.outputs.value }}-windows.zip
          retention-days: 30

  # ── Linux ────────────────────────────────────────────────────────────────────
  linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true
      - run: flutter pub get
      - name: Build Linux
        run: |
          flutter build linux --release \
            --dart-define=CF_ACCESS_CLIENT_ID=${{ secrets.CF_ACCESS_CLIENT_ID }} \
            --dart-define=CF_ACCESS_CLIENT_SECRET=${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      - name: Package
        run: |
          tar -czf ol1n-llm-${{ needs.version.outputs.value }}-linux.tar.gz \
            -C build/linux/x64/release/bundle .
      - uses: actions/upload-artifact@v4
        with:
          name: linux-${{ needs.version.outputs.value }}
          path: ol1n-llm-${{ needs.version.outputs.value }}-linux.tar.gz
          retention-days: 30

  # ── Release ──────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [version, android, ios, macos, windows, linux]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Create git tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'refs/tags/${{ needs.version.outputs.value }}',
              sha: context.sha
            });

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.value }}
          name: ${{ needs.version.outputs.value }}
          prerelease: ${{ contains(needs.version.outputs.value, '-alpha') || contains(needs.version.outputs.value, '-beta') || contains(needs.version.outputs.value, '-rc') }}
          generate_release_notes: true
          files: |
            dist/*.apk
            dist/*.ipa
            dist/*-macos.zip
            dist/*-windows.zip
            dist/*-linux.tar.gz
