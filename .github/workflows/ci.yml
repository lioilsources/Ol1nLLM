name: CI

on:
  push:
    branches: ['**']
    tags-ignore: ['v*']
  pull_request:
    branches: ['**']

jobs:
  test:
    name: Tests & Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: .
        run: flutter pub get

      - name: Analyze
        working-directory: .
        run: flutter analyze --no-fatal-infos

      - name: Test
        working-directory: .
        run: flutter test

  build-android-debug:
    name: Android Debug Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: .
        run: flutter pub get

      - name: Build APK (debug)
        working-directory: .
        run: flutter build apk --debug --dart-define=CF_ACCESS_CLIENT_ID=${{ secrets.CF_ACCESS_CLIENT_ID }} --dart-define=CF_ACCESS_CLIENT_SECRET=${{ secrets.CF_ACCESS_CLIENT_SECRET }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-${{ github.sha }}
          path: ./build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  build-ios-debug:
    name: iOS Debug Build (Simulator)
    runs-on: macos-15
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: .
        run: flutter pub get

      - name: Build iOS (no signing)
        working-directory: .
        run: flutter build ios --debug --no-codesign --dart-define=CF_ACCESS_CLIENT_ID=${{ secrets.CF_ACCESS_CLIENT_ID }} --dart-define=CF_ACCESS_CLIENT_SECRET=${{ secrets.CF_ACCESS_CLIENT_SECRET }}

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-debug-${{ github.sha }}
          path: ./build/ios/iphoneos/Runner.app
          retention-days: 7
